<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Odoo | Expense Management</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

    <div id="loginSection" class="login-container d-flex align-items-center justify-content-center">
        <div class="card login-card p-5 border-0 shadow-lg" style="width: 420px;">
            <div class="text-center mb-4">
                <h1 style="color: #714B67; font-weight: 800; letter-spacing: -1px;">odoo</h1>
                <p class="text-muted small uppercase fw-bold">Reimbursement Portal</p>
            </div>
            <div class="mb-3">
                <label class="form-label small fw-bold text-secondary">Email Address</label>
                <input type="email" id="email" class="form-control form-control-lg" placeholder="admin@test.com">
            </div>
            <div class="mb-4">
                <label class="form-label small fw-bold text-secondary">Password</label>
                <input type="password" id="password" class="form-control form-control-lg" placeholder="••••••••">
            </div>
            <button onclick="login()" class="btn odoo-btn w-100 py-3 shadow-sm">Sign In</button>
            <div class="text-center mt-4">
                <small class="text-muted">VIT Hackathon Edition 2026</small>
            </div>
        </div>
    </div>

    <div id="dashboard" class="hidden">
        <aside class="sidebar shadow">
            <div class="px-4 mb-5">
                <h2 class="mb-0 text-white">odoo</h2>
                <span class="badge bg-light text-dark tiny">Expenses</span>
            </div>
            <nav class="nav flex-column">
                <a class="nav-link active" href="#"><i class="bi bi-grid-fill me-3"></i> My Expenses</a>
                <a class="nav-link" href="#" onclick="alert('Analytics locked for Demo')"><i class="bi bi-pie-chart-fill me-3"></i> Reports</a>
                <div class="mt-auto pt-5">
                    <a class="nav-link text-danger" href="#" onclick="location.reload()">
                        <i class="bi bi-box-arrow-left me-3"></i> Sign Out
                    </a>
                </div>
            </nav>
        </aside>

        <main class="main-content">
            <header class="d-flex justify-content-between align-items-end mb-5">
                <div>
                    <h2 id="welcomeMsg" class="fw-bold mb-1 text-dark">Dashboard</h2>
                    <p class="text-muted mb-0">Track and manage your corporate spending.</p>
                </div>
                <button class="btn odoo-btn px-4 shadow-sm" data-bs-toggle="modal" data-bs-target="#expenseModal">
                    <i class="bi bi-plus-lg me-2"></i> New Expense Claim
                </button>
            </header>

            <div class="row g-4">
                <div class="col-lg-8">
                    <div class="card border-0 shadow-sm p-4">
                        <div class="d-flex justify-content-between align-items-center mb-4">
                            <h5 class="fw-bold mb-0">Recent Activity</h5>
                            <button class="btn btn-sm btn-outline-secondary" onclick="loadHistory()">
                                <i class="bi bi-arrow-clockwise"></i> Refresh
                            </button>
                        </div>
                        <div class="table-responsive">
                            <table class="table table-hover align-middle" id="histTable">
                                <thead class="table-light">
                                    <tr class="small text-uppercase text-muted">
                                        <th>Date</th>
                                        <th>Category</th>
                                        <th>Amount</th>
                                        <th>Status</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    </tbody>
                            </table>
                        </div>
                    </div>
                </div>

                <div id="managerSection" class="col-lg-4 hidden">
                    <div class="card border-0 shadow-sm p-4 bg-white" style="border-top: 4px solid #714B67 !important;">
                        <h5 class="fw-bold mb-4 text-dark"><i class="bi bi-shield-check me-2"></i>Pending Approvals</h5>
                        <div id="pendTable" class="approval-scroll-area">
                            </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <div class="modal fade" id="expenseModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <form id="expForm" class="modal-content border-0 shadow-lg">
                <div class="modal-header border-0 pb-0">
                    <h5 class="fw-bold">Create Expense Claim</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body p-4">
                    <div class="row g-3">
                        <div class="col-md-12">
                            <label class="form-label small fw-bold text-muted">Expense Description</label>
                            <input type="text" name="category" class="form-control" placeholder="e.g. Travel to Client Site" required>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label small fw-bold text-muted">Currency</label>
                            <select name="currency" class="form-select">
                                <option value="INR">INR</option>
                                <option value="USD">USD</option>
                                <option value="EUR">EUR</option>
                            </select>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label small fw-bold text-muted">Amount</label>
                            <input type="number" step="0.01" name="amount" class="form-control" placeholder="0.00" required>
                        </div>
                        <div class="col-12">
                            <label class="form-label small fw-bold text-muted">Date of Transaction</label>
                            <input type="date" name="date" class="form-control" required>
                        </div>
                        <div class="col-12">
                            <label class="form-label small fw-bold text-muted">Receipt / Invoice (Image)</label>
                            <input type="file" name="receipt" class="form-control" accept="image/*">
                        </div>
                    </div>
                </div>
                <div class="modal-footer border-0 pt-0">
                    <button type="submit" class="btn odoo-btn w-100 py-3 mt-2">Submit for Approval</button>
                </div>
            </form>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>
</html>
