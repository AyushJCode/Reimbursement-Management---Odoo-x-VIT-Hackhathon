<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Odoo | Expense Management</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

    <div id="loginSection" class="login-container">
        <div class="card p-5 shadow-lg" style="width: 420px;">
            <div class="text-center mb-4">
                <h1 style="color: var(--odoo-purple); font-weight: 900;">odoo</h1>
                <p class="text-muted small fw-bold">REIMBURSEMENT PORTAL</p>
            </div>
            <input type="email" id="email" class="form-control mb-3" placeholder="admin@test.com">
            <input type="password" id="password" class="form-control mb-4" placeholder="••••••••">
            <button onclick="login()" class="btn odoo-btn w-100 py-2 fw-bold">Sign In</button>
        </div>
    </div>

    <div id="dashboard" class="hidden">
        <aside class="sidebar">
            <h2>odoo</h2>
            <nav class="nav flex-column mt-5">
                <a class="nav-link active" href="#" onclick="loadHistory()"><i class="bi bi-grid-fill me-3"></i> My Expenses</a>
                <a class="nav-link" href="#" onclick="showReports()"><i class="bi bi-pie-chart-fill me-3"></i> Reports</a>
                <a class="nav-link mt-5 text-danger" href="#" onclick="location.reload()"><i class="bi bi-box-arrow-left me-3"></i> Logout</a>
            </nav>
        </aside>

        <main class="main-content">
            <header class="d-flex justify-content-between align-items-center mb-5">
                <div>
                    <h2 id="welcomeMsg" class="fw-bold mb-0">My Expenses</h2>
                    <p class="text-muted mb-0">Track and manage your corporate spending.</p>
                </div>
                <button class="btn odoo-btn px-4" data-bs-toggle="modal" data-bs-target="#expenseModal">
                    <i class="bi bi-plus-lg me-2"></i> New Expense Claim
                </button>
            </header>

            <div class="dashboard-grid">
                <div class="card p-4">
                    <table class="table align-middle" id="histTable">
                        <thead class="table-light">
                            <tr class="small text-uppercase fw-bold text-muted">
                                <th>Date</th><th>Category</th><th>Amount</th><th>Status</th>
                            </tr>
                        </thead>
                        <tbody></tbody>
                    </table>
                </div>

                <div id="managerSection" class="hidden">
                    <h5 class="fw-bold mb-4"><i class="bi bi-shield-check me-2"></i>Pending Approvals</h5>
                    <div id="pendTable">
                        </div>
                </div>
            </div>
        </main>
    </div>

    <div class="modal fade" id="expenseModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <form id="expForm" class="modal-content border-0 shadow-lg">
                <div class="modal-header border-0">
                    <h5 class="fw-bold">Create Expense Claim</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body p-4">
                    <label class="form-label small fw-bold">Description/Category</label>
                    <input type="text" name="category" class="form-control mb-3" placeholder="e.g. Client Lunch" required>
                    
                    <div class="row g-3">
                        <div class="col-md-8">
                            <label class="form-label small fw-bold">Amount</label>
                            <input type="number" step="0.01" name="amount" class="form-control" required>
                        </div>
                        <div class="col-md-4">
                            <label class="form-label small fw-bold">Currency</label>
                            <select name="currency" class="form-select">
                                <option value="INR">INR</option>
                                <option value="USD">USD</option>
                            </select>
                        </div>
                    </div>
                    
                    <label class="form-label small fw-bold mt-3">Date</label>
                    <input type="date" name="date" class="form-control" required>
                </div>
                <div class="modal-footer border-0">
                    <button type="submit" class="btn odoo-btn w-100 py-2">Submit for Approval</button>
                </div>
            </form>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>
</html>
