<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Odoo | Expense Management</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

    <div id="loginSection" class="login-container">
        <div class="card p-5 shadow-lg" style="width: 420px; border-radius: 12px;">
            <div class="text-center mb-4">
                <h1 style="color: var(--odoo-purple); font-weight: 900; letter-spacing: -2px;">odoo</h1>
                <p id="authSubtext" class="text-muted small fw-bold">REIMBURSEMENT PORTAL</p>
            </div>

            <form id="loginForm" onsubmit="event.preventDefault(); login();">
                <div id="loginFields">
                    <input type="email" id="email" class="form-control mb-3" placeholder="admin@test.com" required>
                    <input type="password" id="password" class="form-control mb-4" placeholder="••••••••" required>
                    <button type="submit" class="btn odoo-btn w-100 py-2 fw-bold">Sign In</button>
                    <p class="text-center mt-3 small">New? <a href="#" onclick="toggleAuth(true)" style="color: var(--odoo-purple);">Register Company</a></p>
                </div>
            </form>

            <form id="registerForm" onsubmit="event.preventDefault(); register();" class="hidden">
                <div id="registerFields">
                    <input type="text" id="regName" class="form-control mb-2" placeholder="Full Name" required>
                    <input type="email" id="regEmail" class="form-control mb-2" placeholder="Email (e.g. name@company.com)" required>
                    <input type="password" id="regPassword" class="form-control mb-2" placeholder="Password" required>
                    <input type="text" id="regCompany" class="form-control mb-2" placeholder="Company Name" required>
                    <select id="regCurrency" class="form-select mb-3">
                        <option value="INR">India (INR)</option>
                        <option value="USD">USA (USD)</option>
                    </select>
                    <button type="submit" class="btn odoo-btn w-100 py-2 fw-bold">Create Account</button>
                    <p class="text-center mt-3 small">Already have an account? <a href="#" onclick="toggleAuth(false)" style="color: var(--odoo-purple);">Sign In</a></p>
                </div>
            </form>
        </div>
    </div>

    <div id="dashboard" class="hidden">
        <aside class="sidebar">
            <h2 class="text-center text-white mb-5">odoo</h2>
            <nav class="nav flex-column">
                <a class="nav-link active" href="#" onclick="loadHistory()"><i class="bi bi-grid-fill me-3"></i> My Expenses</a>
                <a class="nav-link" href="#" onclick="showReports()"><i class="bi bi-pie-chart-fill me-3"></i> Reports</a>
                <a class="nav-link mt-5 text-danger" href="#" onclick="location.reload()"><i class="bi bi-box-arrow-left me-3"></i> Sign Out</a>
            </nav>
        </aside>

        <main class="main-content">
            <header class="d-flex justify-content-between align-items-center mb-5">
                <div>
                    <h2 id="welcomeMsg" class="fw-bold mb-0 text-dark">Dashboard</h2>
                    <p class="text-muted mb-0 small">Company Spending Transparency Portal</p>
                </div>
                <button class="btn odoo-btn px-4" data-bs-toggle="modal" data-bs-target="#expenseModal">
                    <i class="bi bi-plus-lg me-2"></i> New Claim
                </button>
            </header>

            <div class="dashboard-grid">
                <div class="card p-4 shadow-sm border-0">
                    <table class="table align-middle" id="histTable">
                        <thead class="table-light">
                            <tr class="small text-uppercase text-muted">
                                <th>Date</th><th>Category</th><th>Amount</th><th>Status</th>
                            </tr>
                        </thead>
                        <tbody></tbody>
                    </table>
                </div>

                <div id="managerSection" class="hidden">
                    <h5 class="fw-bold mb-4 text-dark"><i class="bi bi-shield-check me-2"></i>Pending Reviews</h5>
                    <div id="pendTable"></div>
                </div>
            </div>
        </main>
    </div>

    <div class="modal fade" id="expenseModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <form id="expForm" class="modal-content border-0">
                <div class="modal-header"><h5>Submit New Expense</h5></div>
                <div class="modal-body">
                    <input type="text" name="category" class="form-control mb-2" placeholder="Category" required>
                    <div class="input-group mb-2">
                        <input type="number" step="0.01" name="amount" class="form-control" required>
                        <select name="currency" class="form-select">
                            <option value="INR">INR</option>
                            <option value="USD">USD</option>
                        </select>
                    </div>
                    <input type="date" name="date" class="form-control mb-2" required>
                    <textarea name="description" class="form-control" placeholder="Description"></textarea>
                </div>
                <div class="modal-footer"><button type="submit" class="btn odoo-btn w-100">Submit for Approval</button></div>
            </form>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>
</html>
